name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Python — core-python/
  # ===========================================================================
  python-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core-python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Ruff check
        run: uv run ruff check src tests scripts

      - name: Ruff format check
        run: uv run ruff format --check src tests scripts

  python-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core-python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Mypy
        run: uv run mypy src

  python-test:
    runs-on: ubuntu-latest
    needs: [python-lint, python-typecheck]
    defaults:
      run:
        working-directory: core-python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Run unit + integration tests (sin dataset, sin slow)
        run: uv run pytest -m "not dataset and not slow" --cov-report=xml

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-report
          path: core-python/coverage.xml
          retention-days: 7

  # ===========================================================================
  # Java — core-java/  (RT-01..RT-04)
  # ===========================================================================
  java-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core-java
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Spotless check
        run: mvn spotless:check

      - name: Test
        run: mvn -B verify

      - name: Upload JaCoCo report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: java-coverage-report
          path: core-java/target/site/jacoco/
          retention-days: 7

  # ===========================================================================
  # Validación dual RT-02 — comparación de outputs
  # ===========================================================================
  # Se activa cuando ambos cores produzcan outputs sobre el dataset (post-H3).
  # Por ahora queda como job de placeholder.
  compare:
    runs-on: ubuntu-latest
    needs: [python-test, java-test]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run dataset on core-python
        working-directory: core-python
        run: uv run sentinel run-dataset --out /tmp/python-out/

      - name: Run dataset on core-java
        working-directory: core-java
        run: mvn -B exec:java -Dexec.mainClass="cl.ucen.sentinel.cli.Main" -Dexec.args="run-dataset --in ../data/dataset/incidentes.json --unidades ../data/dataset/unidades.json --graph ../data/graphs/coquimbo.graphml --out /tmp/java-out/"

      - name: Compare outputs (RT-02)
        run: |
          uv run --no-project python tools/compare_outputs.py \
            --python /tmp/python-out/ \
            --java /tmp/java-out/ \
            --report docs/quality/rt-validation-report.md

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: rt-validation-report
          path: docs/quality/rt-validation-report.md
          retention-days: 30

  # ===========================================================================
  # Seguridad (transversal)
  # ===========================================================================
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
